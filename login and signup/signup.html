<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Krishi Sanjal</title>
  <link rel="stylesheet" href="signup.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
  
  <header>
    <div class="header-container">
      <img src="/logo.jpeg" alt="Krishi Sanjal Logo" class="logo">
      <h1>Krishi Sanjal</h1>
    </div>
  </header>

  <div class="form">
    <form>
      <h2>Sign up to Krishi Sanjal</h2>

      
      <div class="input-group">
        <div class="input-field">
          <input type="text" placeholder="Full Name" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-field">
          <input type="text" placeholder="Username" required>
          <i class='bx bxs-user'></i>
        </div>
      </div>

      
      <div class="input-group">
        <div class="input-field">
          <input type="email" placeholder="Email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-field">
          <input type="number" placeholder="Phone number" required>
          <i class='bx bxs-phone'></i>
        </div>
      </div>

      
      <div class="input-group">
        <div class="input-field">
          <input type="password" placeholder="Password" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <div class="input-field">
          <input type="password" placeholder="Confirm Password" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
      </div>

      
      <div class="input-group">
        <div class="input-field full-width">
          <select id="userTypeSelect" required>
            <option value="" disabled selected>Sign up as</option>
            <option value="farmer">Farmer</option>
            <option value="consumer">Consumer</option>
          </select>
        </div>
      </div>

      
      <div class="input-group" id="farmerFields" style="display: none;">
        <div class="input-field">
          <input type="text" placeholder="Registration Code" required>
          <i class='bx bxs-id-card'></i>
        </div>
        <div class="input-field">
          <input type="text" placeholder="Shop Name" required>
          <i class='bx bxs-store'></i>
        </div>
        <div class="input-field full-width">
          <input type="text" placeholder="Address" required>
          <i class='bx bxs-map'></i>
        </div>
      </div>

      
      <label>
        <input type="checkbox" required> I hereby declare that the above information provided is true.
      </label>

      
      <button type="submit" class="btn">Sign Up</button>
    </form>

    
    <p>Already have an account? <a href="/login and signup/login.html">Login here</a></p>
  </div>

  <script src="signup.js"></script>
</body>

</html>
